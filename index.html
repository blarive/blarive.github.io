<title>Carnet de Pêche - Journal de bord</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --eau: #1a3a4a;
    --eau-profonde: #0d2231;
    --eau-claire: #2a6080;
    --sable: #e8d5a3;
    --mousse: #4a7c59;
    --eclair: #f0c040;
    --blanc: #f5f0e8;
    --texte: #1a2a35;
    --gris: #8a9aa5;
    --rouge: #c0392b;
    --radius: 14px;
    --sidebar-w: 240px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }

  body {
    font-family:'DM Sans',sans-serif;
    background:#eef2f5;
    color:var(--texte);
    display:flex;
    min-height:100vh;
  }

  .sidebar {
    width:var(--sidebar-w);
    background:linear-gradient(180deg,var(--eau-profonde) 0%,var(--eau) 100%);
    display:flex;
    flex-direction:column;
    flex-shrink:0;
    position:fixed;
    top:0;left:0;bottom:0;
    z-index:100;
    overflow:hidden;
  }

  .sidebar-logo { padding:32px 24px 20px; position:relative
