<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Journal de pêche</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <meta name="theme-color" content="#0d1117">

  <!-- ========================= -->
  <!-- 🎨 BLOC 1 — STYLE COMPLET -->
  <!-- ========================= -->
  <style>
    /* THEME SYSTEM */
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-soft: #1f242d;
      --text: #e6edf3;
      --text-soft: #9ba3b4;
      --accent: #2ea043;
      --accent-soft: #238636;
      --border: #30363d;
      --tag-bg: #21262d;
      --tag-border: #30363d;
      --star: #f1c40f;
      --panel-bg: #161b22;
      --panel-shadow: rgba(0,0,0,0.45);
    }
    .light {
      --bg: #f2f4f7;
      --bg-card: #ffffff;
      --bg-soft: #e9ecef;
      --text: #1f2937;
      --text-soft: #4b5563;
      --accent: #0ea5e9;
      --accent-soft: #0284c7;
      --border: #d1d5db;
      --tag-bg: #e5e7eb;
      --tag-border: #d1d5db;
      --star: #eab308;
      --panel-bg: #ffffff;
      --panel-shadow: rgba(0,0,0,0.15);
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .25s, color .25s;
    }

    header {
      background: var(--bg-card);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .actions-header { display: flex; gap: 10px; }

    header button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    #themeToggle {
      background: var(--bg-soft);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 999px;
    }

    main { padding: 16px; max-width: 900px; margin: 0 auto; }
    h2 { font-size: 16px; margin: 0 0 12px; font-weight: 600; }

    .hidden { display: none; }

    /* CARDS */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 4px var(--panel-shadow);
      cursor: pointer;
    }
    .card-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .card-header h3 { margin: 0; font-size: 15px; font-weight: 600; }
    .card-header span { font-size: 12px; color: var(--text-soft); }
    .card-meta { font-size: 13px; color: var(--text-soft); margin-bottom: 6px; }
    .stars { color: var(--star); }

    /* TAGS */
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      font-size: 11px;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    /* MINI GALERIE */
    .mini-galerie { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .mini-photo {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    /* CARROUSEL */
    .carousel {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      scroll-snap-type: x mandatory;
      padding-bottom: 10px;
    }
    .carousel img {
      width: 85%; max-width: 420px; height: 260px;
      object-fit: cover;
      border-radius: 12px;
      scroll-snap-align: center;
      border: 1px solid var(--border);
    }

    /* PANELS */
    .panel {
      position: fixed;
      left: 0; right: 0;
      bottom: -100%;
      height: 85%;
      background: var(--panel-bg);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      box-shadow: 0 -4px 20px var(--panel-shadow);
      transition: bottom .35s ease;
      padding: 18px;
      overflow-y: auto;
      z-index: 999;
    }
    .panel.open { bottom: 0; }
    .panel h2 { margin-top: 0; font-size: 18px; font-weight: 600; }

    /* FORM */
    input, select, textarea {
      width: 100%; padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 14px;
    }
    textarea { min-height: 70px; }
    label { font-size: 13px; margin-bottom: 4px; display: block; color: var(--text-soft); }
    .row { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-secondary {
      background: var(--bg-soft);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    /* FILTRES */
    #filtersPanel {
      background: var(--panel-bg);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .filter-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 10px; }
    .filter-actions { display: flex; gap: 10px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      opacity: 0;
      transition: opacity .2s ease;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

<body>

  <!-- ========================= -->
  <!-- 🎨 BLOC 2 — HTML COMPLET -->
  <!-- ========================= -->

  <header>
    <h1>Journal de pêche</h1>

    <div class="actions-header">
      <button id="themeToggle">🌙</button>
      <button id="filtersToggle">Filtres</button>
      <button id="toggleViewBtn">Nouvelle prise</button>
    </div>
  </header>

  <main>

    <!-- FILTRES -->
    <section id="filtersPanel" class="hidden">
      <h2>Filtres</h2>

      <div class="filter-row">
        <div>
          <label>Espèce</label>
          <select id="filterEspece"><option value="">Toutes</option></select>
        </div>
        <div>
          <label>Lieu</label>
          <select id="filterLieu"><option value="">Tous</option></select>
        </div>
      </div>

      <div class="filter-row">
        <div>
          <label>Trophée</label>
          <select id="filterTrophy">
            <option value="">Tous</option>
            <option value="oui">Oui</option>
            <option value="non">Non</option>
          </select>
        </div>
        <div>
          <label>Note minimum</label>
          <select id="filterStars">
            <option value="">Aucune</option>
            <option value="1">⭐+</option>
            <option value="2">⭐⭐+</option>
            <option value="3">⭐⭐⭐+</option>
            <option value="4">⭐⭐⭐⭐+</option>
            <option value="5">⭐⭐⭐⭐⭐</option>
          </select>
        </div>
      </div>

      <div class="filter-row">
        <div>
          <label>Date min</label>
          <input type="date" id="filterDateMin">
        </div>
        <div>
          <label>Date max</label>
          <input type="date" id="filterDateMax">
        </div>
      </div>

      <div>
        <label>Météo (contient)</label>
        <input type="text" id="filterMeteo">
      </div>

      <div class="filter-actions">
        <button class="btn-primary" id="applyFilters">Appliquer</button>
        <button class="btn-secondary" id="resetFilters">Réinitialiser</button>
      </div>
    </section>

    <!-- JOURNAL -->
    <section id="journalView">
      <h2>Sorties</h2>
      <div class="stats" id="stats"></div>
      <div id="journalList"></div>
    </section>

    <!-- FORMULAIRE -->
    <section id="formView" class="hidden">
      <h2>Ajouter une prise</h2>

      <form id="entryForm">

        <div class="row">
          <div>
            <label>Date</label>
            <input type="date" id="date" required>
          </div>
          <div>
            <label>Lieu</label>
            <input type="text" id="lieu" required>
          </div>
        </div>

        <div class="row">
          <div>
            <label>Espèce</label>
            <input type="text" id="espece" required>
          </div>
          <div>
            <label>Taille (cm)</label>
            <input type="number" id="taille">
          </div>
        </div>

        <div class="row">
          <div>
            <label>Poids (kg)</label>
            <input type="number" id="poids" step="0.01">
          </div>
          <div>
            <label>Technique</label>
            <input type="text" id="technique">
          </div>
        </div>

        <div class="row">
          <div>
            <label>Note</label>
            <select id="stars">
              <option value="1">⭐</option>
              <option value="2">⭐⭐</option>
              <option value="3" selected>⭐⭐⭐</option>
              <option value="4">⭐⭐⭐⭐</option>
              <option value="5">⭐⭐⭐⭐⭐</option>
            </select>
          </div>
          <div>
            <label>Photo (URL)</label>
            <input type="text" id="photo">
          </div>
        </div>

        <div class="row">
          <div>
            <label>Relâché ?</label>
            <select id="relache">
              <option value="oui">Oui</option>
              <option value="non">Non</option>
            </select>
          </div>
          <div>
            <label>Trophée ?</label>
            <select id="trophy">
              <option value="non">Non</option>
              <option value="oui">Oui</option>
            </select>
          </div>
        </div>

        <label>Notes</label>
        <textarea id="notes"></textarea>

        <label>Météo (séparée par virgules)</label>
        <input type="text" id="meteo">

        <div class="actions">
          <button class="btn-primary" type="submit">Enregistrer</button>
          <button class="btn-secondary" type="button" id="cancelBtn">Annuler</button>
        </div>

      </form>
    </section>

  </main>

  <!-- PANEL : FICHE DÉTAILLÉE -->
  <div id="detailPanel" class="panel">
    <h2>Détails de la sortie</h2>
    <div id="detailContent"></div>

    <div class="actions">
      <button class="btn-primary" id="editSortieBtn">Modifier la sortie</button>
      <button class="btn-secondary" id="deleteSortieBtn">Supprimer la sortie</button>
      <button class="btn-secondary" id="closeDetail">Fermer</button>
    </div>
  </div>

  <!-- PANEL : MODIF SORTIE -->
  <div id="editSortiePanel" class="panel">
    <h2>Modifier la sortie</h2>

    <form id="editSortieForm">
      <label>Lieu</label>
      <input type="text" id="editSortieLieu">

      <label>Note</label>
      <select id="editSortieStars">
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
      </select>

      <label>Météo (séparée par virgules)</label>
      <input type="text" id="editSortieMeteo">

      <div class="actions">
        <button class="btn-primary" type="submit">Enregistrer</button>
        <button class="btn-secondary" type="button" id="closeEditSortie">Annuler</button>
      </div>
    </form>
  </div>

  <!-- PANEL : MODIF PRISE -->
  <div id="editPrisePanel" class="panel">
    <h2>Modifier la prise</h2>

    <form id="editPriseForm">

      <label>Espèce</label>
      <input type="text" id="editPriseEspece">

      <label>Taille (cm)</label>
      <input type="number" id="editPriseTaille">

      <label>Poids (kg)</label>
      <input type="number" id="editPrisePoids" step="0.01">

      <label>Technique</label>
      <input type="text" id="editPriseTechnique">

      <label>Photo (URL)</label>
      <input type="text" id="editPrisePhoto">

      <label>Relâché ?</label>
      <select id="editPriseRelache">
        <option value="oui">Oui</option>
        <option value="non">Non</option>
      </select>

      <label>Trophée ?</label>
      <select id="editPriseTrophy">
        <option value="non">Non</option>
        <option value="oui">Oui</option>
      </select>

      <label>Notes</label>
      <textarea id="editPriseNotes"></textarea>

      <div class="actions">
        <button class="btn-primary" type="submit">Enregistrer</button>
        <button class="btn-secondary" type="button" id="deletePriseBtn">Supprimer la prise</button>
        <button class="btn-secondary" type="button" id="closeEditPrise">Annuler</button>
      </div>

    </form>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- ========================= -->
  <!-- 🎣 BLOC 3 — SCRIPT COMPLET -->
  <!-- ========================= -->
  <script>
  let entries = [];
  let currentSortie = null;
  let currentPriseIndex = null;

  /* UTILITAIRES */
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  function formatDate(d) {
    return new Date(d).toLocaleDateString("fr-FR");
  }

  /* THEME */
  function applyTheme() {
    const theme = localStorage.getItem("theme") || "dark";
    document.body.classList.toggle("light", theme === "light");
    document.getElementById("themeToggle").textContent =
      theme === "light" ? "🌙" : "☀️";
  }

  function toggleTheme() {
    const current = localStorage.getItem("theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    localStorage.setItem("theme", next);
    applyTheme();
  }

  /* STORAGE */
  function loadEntries() {
    const raw = localStorage.getItem("peche-entries-v2");
    entries = raw ? JSON.parse(raw) : [];
  }

  function saveEntries() {
    localStorage.setItem("peche-entries-v2", JSON.stringify(entries));
  }

  /* STATS */
  function updateStats() {
    const statsEl = document.getElementById("stats");
    const sorties = entries.length;
    let prises = 0;
    let trophies = 0;

    entries.forEach(e => {
      prises += e.prises.length;
      trophies += e.prises.filter(p => p.trophy === "oui").length;
    });

    statsEl.textContent =
      `${sorties} sortie${sorties > 1 ? "s" : ""} · ` +
      `${prises} prise${prises > 1 ? "s" : ""}` +
      (trophies ? ` · ${trophies} trophée${trophies > 1 ? "s" : ""}` : "");
  }

  /* FILTRES */
  const filters = {
    espece: "",
    lieu: "",
    trophy: "",
    stars: "",
    dateMin: "",
    dateMax: "",
    meteo: ""
  };

  function applyFiltersToEntries() {
    return entries.filter(e => {
      const date = new Date(e.date);

      if (filters.stars) {
        if ((e.stars || 0) < Number(filters.stars)) return false;
      }

      if (filters.dateMin) {
        if (date < new Date(filters.dateMin)) return false;
      }
      if (filters.dateMax) {
        if (date > new Date(filters.dateMax)) return false;
      }

      if (filters.meteo) {
        const m = filters.meteo.toLowerCase();
        const has = (e.meteo || []).some(tag =>
          tag.toLowerCase().includes(m)
        );
        if (!has) return false;
      }

      let prises = e.prises;

      if (filters.espece) {
        prises = prises.filter(p => p.espece === filters.espece);
        if (!prises.length) return false;
      }

      if (filters.lieu) {
        if (e.lieu !== filters.lieu) return false;
      }

      if (filters.trophy) {
        const hasTrophy = e.prises.some(p => p.trophy === filters.trophy);
        if (!hasTrophy) return false;
      }

      return true;
    });
  }

  function populateFilterOptions() {
    const especeSet = new Set();
    const lieuSet = new Set();

    entries.forEach(e => {
      lieuSet.add(e.lieu);
      e.prises.forEach(p => especeSet.add(p.espece));
    });

    const especeSelect = document.getElementById("filterEspece");
    const lieuSelect = document.getElementById("filterLieu");

    especeSelect.innerHTML = '<option value="">Toutes</option>';
    lieuSelect.innerHTML = '<option value="">Tous</option>';

    Array.from(especeSet).sort().forEach(es => {
      const opt = document.createElement("option");
      opt.value = es;
      opt.textContent = es;
      especeSelect.appendChild(opt);
    });

    Array.from(lieuSet).sort().forEach(l => {
      const opt = document.createElement("option");
      opt.value = l;
      opt.textContent = l;
      lieuSelect.appendChild(opt);
    });
  }

  /* RENDU JOURNAL */
  function renderJournal() {
    const list = document.getElementById("journalList");
    list.innerHTML = "";

    const filtered = applyFiltersToEntries();

    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

    filtered.forEach(entry => {
      const card = document.createElement("div");
      card.className = "card";

      const photos = entry.prises
        .map(p => p.photo)
        .filter(p => p && p.trim() !== "");

      card.innerHTML = `
        <div class="card-header">
          <h3>${entry.lieu}</h3>
          <span>${formatDate(entry.date)}</span>
        </div>
        <div class="card-meta">
          ${entry.prises.length} prise${entry.prises.length > 1 ? "s" : ""}
          · <span class="stars">${"⭐".repeat(entry.stars || 0)}</span>
        </div>
        ${
          entry.meteo.length
            ? `<div class="card-meta">
                 ${entry.meteo.map(m => `<span class="tag">${m}</span>`).join("")}
               </div>`
            : ""
        }
        ${
          photos.length
            ? `<div class="mini-galerie">
                 ${photos
                   .map(src => `<img src="${src}" class="mini-photo">`)
                   .join("")}
               </div>`
            : ""
        }
      `;

      card.addEventListener("click", () => openDetail(entry.id));
      list.appendChild(card);
    });

    updateStats();
    populateFilterOptions();
  }

  /* FORMULAIRE AJOUT */
  function resetForm() {
    const form = document.getElementById("entryForm");
    form.reset();
    document.getElementById("date").valueAsDate = new Date();
  }

  function saveEntry(e) {
    e.preventDefault();

    const date = document.getElementById("date").value;
    const lieu = document.getElementById("lieu").value.trim();
    const espece = document.getElementById("espece").value.trim();
    const taille = document.getElementById("taille").value;
    const poids = document.getElementById("poids").value;
    const technique = document.getElementById("technique").value.trim();
    const stars = Number(document.getElementById("stars").value);
    const photo = document.getElementById("photo").value.trim();
    const relache = document.getElementById("relache").value;
    const trophy = document.getElementById("trophy").value;
    const notes = document.getElementById("notes").value.trim();
    const meteo = document
      .getElementById("meteo")
      .value.split(",")
      .map(m => m.trim())
      .filter(Boolean);

    if (!date || !lieu || !espece) {
      showToast("Date, lieu et espèce obligatoires");
      return;
    }

    const dateISO = new Date(date).toISOString();
    const jour = dateISO.split("T")[0];

    const prise = {
      espece,
      taille: taille ? Number(taille) : null,
      poids: poids ? Number(poids) : null,
      technique,
      trophy,
      relache,
      notes,
      photo
    };

    let sortie = entries.find(
      e => e.date.startsWith(jour) && e.lieu === lieu
    );

    if (sortie) {
      sortie.prises.push(prise);
      sortie.stars = Math.max(sortie.stars || 0, stars);
      sortie.meteo = [...new Set([...(sortie.meteo || []), ...meteo])];
      saveEntries();
      showToast("Prise ajoutée 🎣");
    } else {
      entries.unshift({
        id: Date.now(),
        date: dateISO,
        lieu,
        stars,
        meteo,
        prises: [prise]
      });
      saveEntries();
      showToast("Sortie enregistrée 🎣");
    }

    resetForm();
    switchView("journal");
    renderJournal();
  }

  /* VUES */
  function switchView(view) {
    const journal = document.getElementById("journalView");
    const form = document.getElementById("formView");
    const btn = document.getElementById("toggleViewBtn");

    if (view === "form") {
      journal.classList.add("hidden");
      form.classList.remove("hidden");
      btn.textContent = "Voir le journal";
    } else {
      journal.classList.remove("hidden");
      form.classList.add("hidden");
      btn.textContent = "Nouvelle prise";
    }
  }

  /* DETAIL */
  function openDetail(id) {
    currentSortie = entries.find(e => e.id === id);
    if (!currentSortie) return;

    const container = document.getElementById("detailContent");

    const photos = currentSortie.prises
      .map(p => p.photo)
      .filter(p => p && p.trim() !== "");

    const prisesHTML = currentSortie.prises
      .map(
        (p, idx) => `
      <div class="card" style="cursor: default; margin-bottom:8px;">
        <div class="card-meta">
          <strong>${p.espece}</strong>
          ${
            p.trophy === "oui"
              ? '<span class="tag" style="margin-left:6px;">Trophée</span>'
              : ""
          }
        </div>
        <div class="card-meta">
          ${
            p.taille
              ? `${p.taille} cm`
              : ""
          } ${
          p.poids
            ? (p.taille ? " · " : "") + `${p.poids} kg`
            : ""
        }
        </div>
        ${
          p.technique
            ? `<div class="card-meta">Technique : ${p.technique}</div>`
            : ""
        }
        <div class="card-meta">
          Relâché : ${p.relache === "oui" ? "Oui" : "Non"}
        </div>
        ${
          p.notes
            ? `<div class="card-meta">Notes : ${p.notes}</div>`
            : ""
        }
        <button class="btn-secondary" style="margin-top:6px;"
          onclick="openEditPrise(${currentSortie.id}, ${idx}); event.stopPropagation();">
          Modifier cette prise
        </button>
      </div>
    `
      )
      .join("");

    container.innerHTML = `
      ${
        photos.length
          ? `<div class="carousel">
               ${photos
                 .map(src => `<img src="${src}" alt="prise">`)
                 .join("")}
             </div>`
          : ""
      }
      <div class="card-meta">
        <strong>${currentSortie.lieu}</strong> · ${formatDate(
      currentSortie.date
    )}
      </div>
      <div class="card-meta">
        ${currentSortie.prises.length} prise${
      currentSortie.prises.length > 1 ? "s" : ""
    } ·
        <span class="stars">${"⭐".repeat(currentSortie.stars || 0)}</span>
      </div>
      ${
        currentSortie.meteo.length
          ? `<div class="card-meta">
               ${currentSortie.meteo
                 .map(m => `<span class="tag">${m}</span>`)
                 .join("")}
             </div>`
          : ""
      }
      <h3>Prises</h3>
      ${prisesHTML || "<p>Aucune prise.</p>"}
    `;

    document.getElementById("detailPanel").classList.add("open");
  }

  function closeDetail() {
    document.getElementById("detailPanel").classList.remove("open");
    currentSortie = null;
  }

  /* EDIT SORTIE */
  function openEditSortie() {
    if (!currentSortie) return;
    document.getElementById("editSortieLieu").value = currentSortie.lieu;
    document.getElementById("editSortieStars").value = currentSortie.stars || 0;
    document.getElementById("editSortieMeteo").value =
      (currentSortie.meteo || []).join(", ");
    document.getElementById("editSortiePanel").classList.add("open");
  }

  function closeEditSortie() {
    document.getElementById("editSortiePanel").classList.remove("open");
  }

  function submitEditSortie(e) {
    e.preventDefault();
    if (!currentSortie) return;

    currentSortie.lieu =
      document.getElementById("editSortieLieu").value.trim() ||
      currentSortie.lieu;
    currentSortie.stars = Number(
      document.getElementById("editSortieStars").value
    );
    const meteoRaw = document
      .getElementById("editSortieMeteo")
      .value.split(",")
      .map(m => m.trim())
      .filter(Boolean);
    currentSortie.meteo = meteoRaw;

    saveEntries();
    showToast("Sortie modifiée");
    closeEditSortie();
    renderJournal();
    openDetail(currentSortie.id);
  }

  function deleteSortie() {
    if (!currentSortie) return;
    if (!confirm("Supprimer cette sortie ?")) return;
    entries = entries.filter(e => e.id !== currentSortie.id);
    saveEntries();
    showToast("Sortie supprimée");
    closeDetail();
    renderJournal();
  }

  /* EDIT PRISE */
  function openEditPrise(sortieId, index) {
    currentSortie = entries.find(e => e.id === sortieId);
    if (!currentSortie) return;
    currentPriseIndex = index;
    const p = currentSortie.prises[index];

    document.getElementById("editPriseEspece").value = p.espece || "";
    document.getElementById("editPriseTaille").value = p.taille || "";
    document.getElementById("editPrisePoids").value = p.poids || "";
    document.getElementById("editPriseTechnique").value = p.technique || "";
    document.getElementById("editPrisePhoto").value = p.photo || "";
    document.getElementById("editPriseRelache").value = p.relache || "oui";
    document.getElementById("editPriseTrophy").value = p.trophy || "non";
    document.getElementById("editPriseNotes").value = p.notes || "";

    document.getElementById("editPrisePanel").classList.add("open");
  }

  function closeEditPrise() {
    document.getElementById("editPrisePanel").classList.remove("open");
    currentPriseIndex = null;
  }

  function submitEditPrise(e) {
    e.preventDefault();
    if (!currentSortie || currentPriseIndex === null) return;

    const p = currentSortie.prises[currentPriseIndex];

    p.espece = document.getElementById("editPriseEspece").value.trim();
    p.taille = document.getElementById("editPriseTaille").value
      ? Number(document.getElementById("editPriseTaille").value)
      : null;
    p.poids = document.getElementById("editPrisePoids").value
      ? Number(document.getElementById("editPrisePoids").value)
      : null;
    p.technique = document
      .getElementById("editPriseTechnique")
      .value.trim();
    p.photo = document.getElementById("editPrisePhoto").value.trim();
    p.relache = document.getElementById("editPriseRelache").value;
    p.trophy = document.getElementById("editPriseTrophy").value;
    p.notes = document.getElementById("editPriseNotes").value.trim();

    saveEntries();
    showToast("Prise modifiée");
    closeEditPrise();
    renderJournal();
    openDetail(currentSortie.id);
  }

  function deletePrise() {
    if (!currentSortie || currentPriseIndex === null) return;
    if (!confirm("Supprimer cette prise ?")) return;

    currentSortie.prises.splice(currentPriseIndex, 1);

    if (!currentSortie.prises.length) {
      entries = entries.filter(e => e.id !== currentSortie.id);
      closeDetail();
    }

    saveEntries();
    showToast("Prise supprimée");
    closeEditPrise();
    renderJournal();
    if (currentSortie.prises.length) openDetail(currentSortie.id);
  }

  /* INIT */
  document.addEventListener("DOMContentLoaded", () => {
    applyTheme();
    loadEntries();
    renderJournal();
    resetForm();

    document
      .getElementById("themeToggle")
      .addEventListener("click", toggleTheme);

    document
      .getElementById("entryForm")
      .addEventListener("submit", saveEntry);

    document
      .getElementById("toggleViewBtn")
      .addEventListener("click", () => {
        const formView = document.getElementById("formView");
        switchView(formView.classList.contains("hidden") ? "form" : "journal");
      });

    document
      .getElementById("cancelBtn")
      .addEventListener("click", () => {
        resetForm();
        switchView("journal");
      });

    document
      .getElementById("filtersToggle")
      .addEventListener("click", () => {
        document
          .getElementById("filtersPanel")
          .classList.toggle("hidden");
      });

    document
      .getElementById("applyFilters")
      .addEventListener("click", () => {
        filters.espece = document.getElementById("filterEspece").value;
        filters.lieu = document.getElementById("filterLieu").value;
        filters.trophy = document.getElementById("filterTrophy").value;
        filters.stars = document.getElementById("filterStars").value;
        filters.dateMin = document.getElementById("filterDateMin").value;
        filters.dateMax = document.getElementById("filterDateMax").value;
        filters.meteo = document.getElementById("filterMeteo").value.trim();
        renderJournal();
      });

    document
      .getElementById("resetFilters")
      .addEventListener("click", () => {
        Object.keys(filters).forEach(k => (filters[k] = ""));
        document.getElementById("filterEspece").value = "";
        document.getElementById("filterLieu").value = "";
        document.getElementById("filterTrophy").value = "";
        document.getElementById("filterStars").value = "";
        document.getElementById("filterDateMin").value = "";
        document.getElementById("filterDateMax").value = "";
        document.getElementById("filterMeteo").value = "";
        renderJournal();
      });

    document
      .getElementById("closeDetail")
      .addEventListener("click", closeDetail);

    document
      .getElementById("editSortieBtn")
      .addEventListener("click", openEditSortie);

    document
      .getElementById("deleteSortieBtn")
      .addEventListener("click", deleteSortie);

    document
      .getElementById("editSortieForm")
      .addEventListener("submit", submitEditSortie);

    document
      .getElementById("closeEditSortie")
      .addEventListener("click", closeEditSortie);

    document
      .getElementById("editPriseForm")
      .addEventListener("submit", submitEditPrise);

    document
      .getElementById("closeEditPrise")
      .addEventListener("click", closeEditPrise);

    document
      .getElementById("deletePriseBtn")
      .addEventListener("click", deletePrise);
  });
  </script>
  <script>
    if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
